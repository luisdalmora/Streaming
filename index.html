<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Streaming | Dashboard</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind Generated Styles -->
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans h-screen flex flex-col overflow-hidden">

    <!-- Topbar Compacta -->
    <header class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between sticky top-0 z-40 shadow-sm shrink-0">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
            </div>
            <div>
                <h1 class="text-sm font-extrabold tracking-tight text-slate-800">Controle de Streaming</h1>
                <p id="topbar-mes" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Maio/2026</p>
            </div>
        </div>

        <div class="hidden md:flex items-center gap-8">
            <div class="text-center">
                <span class="block text-[10px] font-bold text-slate-400 uppercase">Total Geral</span>
                <span id="topbar-total" class="text-sm font-extrabold text-blue-600">R$ 0,00</span>
            </div>
            <div class="text-center">
                <span class="block text-[10px] font-bold text-slate-400 uppercase">Ativos</span>
                <span id="topbar-count" class="text-sm font-extrabold text-slate-700">0 serviços</span>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <button onclick="abrirModalDivisao()" class="p-2 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-all" title="Ver Divisão">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 2v-6m10 10V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2z"/></svg>
            </button>
            <button onclick="copiarResumo()" class="p-2 text-slate-500 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-all" title="Copiar WhatsApp">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
            </button>
            <div class="w-px h-6 bg-slate-200 mx-1"></div>
            <button onclick="restaurarPadrao()" class="p-2 text-slate-400 hover:text-slate-600 transition-all" title="Restaurar">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            </button>
        </div>
    </header>

    <!-- Main Dashboard Container -->
    <main class="flex-1 flex flex-col gap-6 p-6 overflow-hidden max-w-[1400px] mx-auto w-full">
        
        <!-- Resumo por Pessoa (Cards Horizontais Compactos) -->
        <section id="people-summary" class="flex flex-wrap gap-4 shrink-0">
            <!-- Rendered by app.js -->
        </section>

        <!-- Área Principal (2 Colunas no Desktop) -->
        <div class="flex-1 flex flex-col lg:flex-row gap-6 overflow-hidden">
            
            <!-- Coluna Esquerda: Lista de Streamings -->
            <section class="flex-1 flex flex-col min-h-0 card-premium overflow-hidden">
                <div class="p-4 border-b border-slate-100 flex items-center justify-between shrink-0">
                    <h2 class="text-sm font-bold text-slate-800">Serviços Ativos</h2>
                    <div class="relative w-48">
                        <input type="text" id="search-input" placeholder="Buscar..." class="w-full pl-8 pr-3 py-1.5 text-xs bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-400 transition-colors">
                        <svg class="w-3.5 h-3.5 text-slate-400 absolute left-2.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                </div>
                
                <div id="streaming-list" class="flex-1 overflow-y-auto custom-scrollbar">
                    <!-- Rendered by app.js -->
                </div>
            </section>

            <!-- Coluna Direita: Formulário Compacto -->
            <aside class="w-full lg:w-80 shrink-0 flex flex-col">
                <div class="card-premium p-5 flex flex-col gap-4">
                    <div class="flex items-center justify-between">
                        <h3 id="form-title" class="text-sm font-bold text-slate-800">Novo Streaming</h3>
                        <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
                    </div>
                    
                    <form id="streaming-form" class="flex flex-col gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Nome do Streaming</label>
                            <input type="text" id="f-nome" class="input-premium py-2 text-sm" placeholder="Ex: Netflix" required>
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Valor Mensal</label>
                            <input type="number" step="0.01" id="f-valor" class="input-premium py-2 text-sm" placeholder="0.00" required>
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Pagador</label>
                            <select id="f-pagador" class="input-premium py-2 text-sm appearance-none cursor-pointer">
                                <option value="Luis">Luis</option>
                                <option value="Ivonei">Ivonei</option>
                                <option value="Luciano">Luciano</option>
                            </select>
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Participantes</label>
                            <div class="flex flex-wrap gap-2 p-2 bg-slate-50 border border-slate-200 rounded-xl">
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" name="f-participantes" value="Luis" class="w-3.5 h-3.5 text-blue-600 rounded border-slate-300 focus:ring-blue-500" checked>
                                    <span class="text-xs font-medium text-slate-600">Luis</span>
                                </label>
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" name="f-participantes" value="Ivonei" class="w-3.5 h-3.5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                                    <span class="text-xs font-medium text-slate-600">Ivonei</span>
                                </label>
                                <label class="flex items-center gap-1.5 cursor-pointer">
                                    <input type="checkbox" name="f-participantes" value="Luciano" class="w-3.5 h-3.5 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                                    <span class="text-xs font-medium text-slate-600">Luciano</span>
                                </label>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 mt-2">
                            <button type="submit" id="btn-save" class="btn-premium bg-blue-600 hover:bg-blue-700 text-white shadow-sm shadow-blue-200">
                                Adicionar
                            </button>
                            <button type="button" id="btn-cancel" onclick="resetFormUI()" class="btn-premium bg-slate-100 hover:bg-slate-200 text-slate-600 hidden">
                                Cancelar
                            </button>
                        </div>
                    </form>
                </div>
            </aside>
        </div>
    </main>

    <!-- Modal de Divisão Detalhada -->
    <div id="modal-divisao" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden items-center justify-center p-6 transition-all">
        <div class="bg-white w-full max-w-xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="p-5 border-b border-slate-100 flex items-center justify-between shrink-0">
                <h3 class="font-bold text-slate-800">Divisão Detalhada</h3>
                <button onclick="fecharModalDivisao()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors">
                    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div id="modal-divisao-content" class="flex-1 overflow-y-auto custom-scrollbar">
                <!-- Rendered by app.js -->
            </div>
            <div class="p-5 bg-slate-50 border-t border-slate-100 flex justify-end shrink-0">
                <button onclick="fecharModalDivisao()" class="px-6 py-2 bg-white border border-slate-200 rounded-xl font-bold text-slate-600 hover:bg-slate-100 transition-all">
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 px-6 py-3 bg-slate-800 text-white rounded-xl shadow-xl font-bold text-sm transform translate-y-20 opacity-0 transition-all duration-300 z-[100]">
        Notificação
    </div>

    <!-- Scripts -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
